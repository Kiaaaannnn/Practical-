<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --card: #1c1c22;
      --border: #2a2a35;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --success: #4ade80;
      --warning: #fb923c;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --input-bg: #111118;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .glow-1, .glow-2 {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }
    .glow-1 {
      top: -20%; left: -10%;
      width: 55%; height: 55%;
      background: radial-gradient(ellipse, rgba(124,106,247,0.13) 0%, transparent 70%);
    }
    .glow-2 {
      bottom: -25%; right: -15%;
      width: 60%; height: 60%;
      background: radial-gradient(ellipse, rgba(247,106,138,0.10) 0%, transparent 70%);
    }

    /* ════ LOGIN SCREEN ════ */
    #loginScreen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrapper { width: 100%; max-width: 420px; }

    .portal-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .portal-header .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(247,106,138,0.15));
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 100px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .portal-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .portal-header p { margin-top: 6px; font-size: 13px; color: var(--muted); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both 0.1s;
    }

    .tabs {
      display: flex;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.25s ease;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,106,247,0.35);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }
    input::placeholder { color: #3a3a50; }

    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b8cf9);
      color: #fff;
      box-shadow: 0 6px 24px rgba(124,106,247,0.35);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(124,106,247,0.45);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: #2a2a35;
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .message-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .message-box.show { display: flex; }
    .message-box.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.25);  color: var(--success); }
    .message-box.error   { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.25); color: var(--accent2); }
    .message-box.warning { background: rgba(251,146,60,0.1);  border: 1px solid rgba(251,146,60,0.25);  color: var(--warning); }
    .message-box.info    { background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.25); color: var(--accent); }

    .attempts-bar { margin-top: 14px; }
    .attempts-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .bar-track { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent2);
      transition: width 0.4s ease;
      width: 0%;
    }

    .users-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
    .users-list h3 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .user-chip .uname { font-weight: 600; color: var(--text); }
    .role-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .role-admin { background: rgba(124,106,247,0.2); color: var(--accent); }
    .role-user  { background: rgba(74,222,128,0.15); color: var(--success); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: var(--accent2); }

    .strength-meter { margin-top: 6px; display: flex; gap: 4px; }
    .strength-seg {
      height: 3px;
      flex: 1;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.3s;
    }
    .strength-seg.weak   { background: var(--accent2); }
    .strength-seg.medium { background: var(--warning); }
    .strength-seg.strong { background: var(--success); }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp 0.6s ease both 0.2s;
    }
    .login-footer span { color: var(--accent); }

    /* ════ DASHBOARD SCREEN ════ */
    #dashScreen {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    .dash-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), #9b8cf9);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(124,106,247,0.4);
    }
    .nav-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .nav-title span {
      color: var(--muted);
      font-weight: 400;
      font-size: 13px;
      margin-left: 6px;
    }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .nav-user-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px 5px 7px;
    }
    .nav-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }
    .nav-username { font-size: 13px; font-weight: 500; color: var(--text); }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .logout-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      background: rgba(247,106,138,0.07);
    }

    .dash-body {
      padding: 36px 32px 48px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .welcome-banner {
      background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(247,106,138,0.08));
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 18px;
      padding: 28px 32px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      animation: fadeUp 0.5s ease both 0.05s;
      overflow: hidden;
      position: relative;
    }
    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(124,106,247,0.2), transparent 70%);
      pointer-events: none;
    }
    .welcome-text h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }
    .welcome-text p { font-size: 13px; color: var(--muted); }
    .welcome-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(74,222,128,0.12);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--success);
      white-space: nowrap;
    }
    .dot-live {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease infinite;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }
    .stat-card:hover { border-color: rgba(124,106,247,0.4); transform: translateY(-2px); }
    .stat-card:nth-child(1) { animation-delay: 0.08s; }
    .stat-card:nth-child(2) { animation-delay: 0.13s; }
    .stat-card:nth-child(3) { animation-delay: 0.18s; }
    .stat-card:nth-child(4) { animation-delay: 0.23s; }

    .stat-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 14px;
    }
    .stat-icon.purple { background: rgba(124,106,247,0.15); }
    .stat-icon.pink   { background: rgba(247,106,138,0.15); }
    .stat-icon.green  { background: rgba(74,222,128,0.12); }
    .stat-icon.orange { background: rgba(251,146,60,0.12); }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat-delta {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stat-delta.up   { color: var(--success); }
    .stat-delta.down { color: var(--accent2); }

    .dash-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .dash-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      animation: fadeUp 0.5s ease both 0.28s;
    }
    .dash-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .dash-panel-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .activity-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; padding-bottom: 0; }
    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .activity-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .subject-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .subject-row:last-child { border-bottom: none; }
    .subject-info { display: flex; align-items: center; gap: 10px; }
    .subject-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    .subject-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .subject-code { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .subject-grade { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
    .mini-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 4px;
      width: 80px;
    }
    .mini-bar-fill { height: 100%; border-radius: 99px; }

    /* ── Logout confirm overlay ── */
    #logoutOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }
    #logoutOverlay.show { display: flex; }
    .logout-modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.3s ease both;
    }
    .logout-modal .icon {
      font-size: 36px;
      margin-bottom: 14px;
    }
    .logout-modal h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .logout-modal p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .logout-modal-btns {
      display: flex;
      gap: 10px;
    }
    .btn-cancel {
      flex: 1;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--accent); color: var(--text); }
    .btn-confirm-logout {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent2), #f95e7a);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(247,106,138,0.35);
      transition: all 0.2s;
    }
    .btn-confirm-logout:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(247,106,138,0.45); }

    @media (max-width: 700px) {
      .dash-cols { grid-template-columns: 1fr; }
      .dash-nav  { padding: 0 16px; }
      .dash-body { padding: 20px 16px 40px; }
      .welcome-banner { flex-direction: column; align-items: flex-start; }
      .nav-title span { display: none; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.5; transform: scale(0.85); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- ════ LOGIN SCREEN ════ -->
<div id="loginScreen" style="display:none">
  <div class="wrapper">
    <div class="portal-header">
      <div class="badge">CIT 238 — Mobile App Dev</div>
      <h1>Student Login Portal</h1>
      <p>West Visayas State University · Janiuay Campus</p>
    </div>

    <div class="card" id="mainCard">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Create User</button>
        <button class="tab-btn" onclick="switchTab('users')">Users</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="panel-login">
        <div class="field">
          <label>Username</label>
          <input type="text" id="login-user" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="login-pass" placeholder="Enter your password">
        </div>
        <button class="btn btn-primary"
