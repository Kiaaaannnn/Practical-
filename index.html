<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --card: #1c1c22;
      --border: #2a2a35;
      --accent: #7c6af7;
      --accent2: #f76a8a;
      --success: #4ade80;
      --warning: #fb923c;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --input-bg: #111118;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      right: -20%;
      width: 60%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(247,106,138,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    /* Logo / Header */
    .portal-header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .portal-header .badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(124,106,247,0.2), rgba(247,106,138,0.15));
      border: 1px solid rgba(124,106,247,0.3);
      border-radius: 100px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .portal-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .portal-header p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both 0.1s;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 7px;
      transition: all 0.25s ease;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,106,247,0.35);
    }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Form elements */
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
    }
    input::placeholder { color: #3a3a50; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b8cf9);
      color: #fff;
      box-shadow: 0 6px 24px rgba(124,106,247,0.35);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 30px rgba(124,106,247,0.45);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: #2a2a35;
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(124,106,247,0.07); }

    /* Message box */
    .message-box {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .message-box.show { display: flex; }
    .message-box.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color: var(--success); }
    .message-box.error   { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.25); color: var(--accent2); }
    .message-box.warning { background: rgba(251,146,60,0.1);  border: 1px solid rgba(251,146,60,0.25);  color: var(--warning); }
    .message-box.info    { background: rgba(124,106,247,0.1); border: 1px solid rgba(124,106,247,0.25); color: var(--accent); }

    /* Attempts bar */
    .attempts-bar {
      margin-top: 14px;
    }
    .attempts-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent2);
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Users list */
    .users-list {
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .users-list h3 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 8px;
      font-size: 13px;
      animation: fadeUp 0.3s ease both;
    }
    .user-chip .uname {
      font-weight: 600;
      color: var(--text);
    }
    .user-chip .role-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .role-admin { background: rgba(124,106,247,0.2); color: var(--accent); }
    .role-user  { background: rgba(74,222,128,0.15); color: var(--success); }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: var(--accent2); }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 16px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Strength indicator */
    .strength-meter { margin-top: 6px; display: flex; gap: 4px; }
    .strength-seg {
      height: 3px;
      flex: 1;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.3s;
    }
    .strength-seg.weak   { background: var(--accent2); }
    .strength-seg.medium { background: var(--warning); }
    .strength-seg.strong { background: var(--success); }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      animation: fadeUp 0.6s ease both 0.2s;
    }
    .footer span { color: var(--accent); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Shake animation on error */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="portal-header">
    <div class="badge">CIT 238 — Mobile App Dev</div>
    <h1>Student Login Portal</h1>
    <p>West Visayas State University · Janiuay Campus</p>
  </div>

  <div class="card" id="mainCard">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create User</button>
      <button class="tab-btn" onclick="switchTab('users')">Users</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="panel active" id="panel-login">
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter your username" autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>

      <div class="attempts-bar" id="attemptsBar" style="display:none">
        <div class="attempts-label">
          <span>Failed attempts</span>
          <span id="attemptsCount">0 / 3</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      </div>

      <div class="message-box" id="loginMsg"></div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel" id="panel-register">
      <div class="field">
        <label>New Username</label>
        <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Choose a password" oninput="checkStrength()">
        <div class="strength-meter">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="reg-confirm" placeholder="Re-enter password">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account →</button>
      <div class="message-box" id="regMsg"></div>
    </div>

    <!-- USERS PANEL -->
    <div class="panel" id="panel-users">
      <div class="message-box info show">
        <span>ℹ️</span><span>Showing all registered accounts</span>
      </div>
      <div class="users-list">
        <h3>Registered Users</h3>
        <div id="usersList"></div>
      </div>
    </div>

  </div>

  <div class="footer">
    Secured with client-side JS validation &nbsp;·&nbsp; <span>CIT 238</span> Final Exam
  </div>
</div>

<script>
  // ── Data ──────────────────────────────────────────────
  var users = [
    { username: "Juan",     password: "2001" },
    { username: "student1", password: "1111" },
    { username: "student2", password: "2222" }
  ];

  var attempts = 0;
  var maxAttempts = 3;
  var locked = false;

  // ── Tab switching ─────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    var idx = ['login','register','users'].indexOf(tab);
    document.querySelectorAll('.tab-btn')[idx].classList.add('active');
    if (tab === 'users') renderUsers();
  }

  // ── Show message ──────────────────────────────────────
  function showMsg(id, type, icon, text) {
    var el = document.getElementById(id);
    el.className = 'message-box show ' + type;
    el.innerHTML = '<span>' + icon + '</span><span>' + text + '</span>';
  }

  // ── Login ─────────────────────────────────────────────
  function doLogin() {
    if (locked) return;

    var u = document.getElementById('login-user').value.trim();
    var p = document.getElementById('login-pass').value;

    if (!u || !p) {
      showMsg('loginMsg', 'warning', '⚠️', 'Please fill in both fields.');
      shake();
      return;
    }

    var found = users.find(function(x) { return x.username === u && x.password === p; });

    if (found) {
      attempts = 0;
      document.getElementById('attemptsBar').style.display = 'none';
      showMsg('loginMsg', 'success', '✅', 'Welcome, ' + u + '!');
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('loginBtn').textContent = 'Signed In ✓';
    } else {
      attempts++;
      document.getElementById('attemptsBar').style.display = 'block';
      document.getElementById('attemptsCount').textContent = attempts + ' / ' + maxAttempts;
      document.getElementById('barFill').style.width = (attempts / maxAttempts * 100) + '%';
      shake();

      if (attempts >= maxAttempts) {
        locked = true;
        document.getElementById('loginBtn').disabled = true;
        document.getElementById('loginBtn').textContent = 'Account Locked';
        showMsg('loginMsg', 'error', '🔒', 'Account Locked! Too many failed attempts.');
      } else {
        var left = maxAttempts - attempts;
        showMsg('loginMsg', 'error', '❌', 'Invalid credentials. ' + left + ' attempt' + (left > 1 ? 's' : '') + ' remaining.');
      }
    }
  }

  function shake() {
    var card = document.getElementById('mainCard');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
  }

  // ── Register ──────────────────────────────────────────
  function doRegister() {
    var u = document.getElementById('reg-user').value.trim();
    var p = document.getElementById('reg-pass').value;
    var c = document.getElementById('reg-confirm').value;

    if (!u || !p || !c) {
      showMsg('regMsg', 'warning', '⚠️', 'All fields are required.');
      return;
    }
    if (u.length < 3) {
      showMsg('regMsg', 'warning', '⚠️', 'Username must be at least 3 characters.');
      return;
    }
    if (users.find(function(x) { return x.username.toLowerCase() === u.toLowerCase(); })) {
      showMsg('regMsg', 'error', '❌', 'Username already exists.');
      return;
    }
    if (p !== c) {
      showMsg('regMsg', 'error', '❌', 'Passwords do not match.');
      return;
    }
    if (p.length < 4) {
      showMsg('regMsg', 'warning', '⚠️', 'Password must be at least 4 characters.');
      return;
    }

    users.push({ username: u, password: p });
    showMsg('regMsg', 'success', '🎉', 'Account created for ' + u + '!');
    document.getElementById('reg-user').value = '';
    document.getElementById('reg-pass').value = '';
    document.getElementById('reg-confirm').value = '';
    resetStrength();

    setTimeout(function() { switchTab('users'); }, 1200);
  }

  // ── Password strength ───────────────────────────────  function checkStrength() {
    var p = document.getElementById('reg-pass').value;
    var score = 0;
    if (p.length >= 4)  score++;
    if (p.length >= 8)  score++;
    if (/[A-Z]/.test(p) || /\d/.test(p)) score++;
    if (/[!@#$%^&*]/.test(p)) score++;
    var segs = ['s1','s2','s3','s4'];
    var cls  = ['','weak','medium','medium','strong'];
    segs.forEach(function(id, i) {
      var el = document.getElementById(id);
      el.className = 'strength-seg';
      if (i < score) el.classList.add(score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong');
    });
  }
  function resetStrength() {
    ['s1','s2','s3','s4'].forEach(function(id) {
      document.getElementById(id).className = 'strength-seg';
    });
  }

  // ── Render users list ─────────────────────────────────
  function renderUsers() {
    var list = document.getElementById('usersList');
    list.innerHTML = '';
    users.forEach(function(u, i) {
      var isAdmin = u.username.toLowerCase() === 'admin' || i === 0;
      list.innerHTML +=
        '<div class="user-chip">' +
          '<span class="uname">👤 ' + u.username + '</span>' +
          '<span class="role-tag ' + (isAdmin ? 'role-admin' : 'role-user') + '">' + (isAdmin ? 'Admin' : 'User') + '</span>' +
          '<button class="delete-btn" onclick="deleteUser(' + i + ')" title="Remove">✕</button>' +
        '</div>';
    });
    if (users.length === 0) {
      list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0;">No users registered yet.</div>';
    }
  }

  function deleteUser(i) {
    if (confirm('Remove user "' + users[i].username + '"?')) {
      users.splice(i, 1);
      renderUsers();
    }
  }

  // ── Enter key support ─────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    var active = document.querySelector('.panel.active').id;
    if (active === 'panel-login')    doLogin();
    if (active === 'panel-register') doRegister();
  });
</script>
</body>
    </html>
